<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Python API</title>
</head>
<body>
    <pre id="json-output">Loading...</pre>

    <script>
        // Automatically fetch data from your Python function
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name') || 'Guest';

        fetch(`/.netlify/functions/welcome?name=${name}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('json-output').textContent = JSON.stringify(data, null, 2);
            })
            .catch(err => {
                document.getElementById('json-output').textContent = JSON.stringify({ error: "Failed to load Python backend" });
            });
    </script>
</body>
</html>
